<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jonathan's Daily Task List</title>
<style>
:root {
  --navy:#1F3864;--navy-lt:#2a4a7f;--bg:#f4f6f9;--surface:#fff;--border:#dde2ea;
  --text:#1a1d23;--text2:#5a6272;--text3:#9aa3b2;
  --p1:#8B2635;--p1bg:#fbedef;--p2:#92580A;--p2bg:#fdf3e3;--p3:#1a1d23;
  --accent:#1F3864;--accent-hover:#2a4a7f;
  --radius:8px;--radius-sm:5px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:18px 16px 80px}

/* Header */
.app-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:10px}
.app-title{font-size:20px;font-weight:700;color:var(--navy);letter-spacing:-.3px}
.app-date{font-size:11px;color:var(--text3);margin-top:2px}
.header-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.btn:hover{background:#f0f2f6}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:var(--navy-lt)}
.btn.sm{padding:4px 9px;font-size:11px}
.btn.danger{color:#c0392b;border-color:#f5c6cb}
.btn.danger:hover{background:#fbedef}

/* Section cards */
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.sec-hdr{display:flex;align-items:center;background:var(--navy);color:#fff;padding:7px 12px;gap:8px;cursor:pointer;user-select:none}
.sec-hdr:hover{background:var(--navy-lt)}
.sec-hdr h3{font-size:12px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;flex:1}
.sec-count{font-size:11px;background:rgba(255,255,255,.2);border-radius:10px;padding:1px 7px}
.sec-add-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:var(--radius-sm);padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.sec-add-btn:hover{background:rgba(255,255,255,.25)}

/* Split sections */
.split-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.split-col{border-right:1px solid var(--border)}
.split-col:last-child{border-right:none}
.split-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:6px 10px 3px;border-bottom:1px solid var(--border)}

/* Task rows */
.trow{display:flex;align-items:flex-start;gap:7px;padding:5px 10px;border-bottom:1px solid #f0f2f5;transition:background .1s}
.trow:last-child{border-bottom:none}
.trow:hover{background:#f8f9fc}
.trow.done .ttext{text-decoration:line-through;color:var(--text3)}
.trow input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--navy)}
.ttext{flex:1;border:none;background:transparent;font-size:12px;color:var(--text);font-family:inherit;outline:none;line-height:1.4;resize:none;padding:0}
.ttext:focus{background:#f0f4ff;border-radius:3px;padding:0 3px}

/* Priority badge */
.pbadge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;cursor:pointer;border:none;font-family:inherit}
.pbadge.p1{background:var(--p1bg);color:var(--p1)}
.pbadge.p2{background:var(--p2bg);color:var(--p2)}
.pbadge.p3{background:#f0f2f6;color:var(--text2)}

/* Due date & notes on task row */
.task-meta{display:flex;align-items:center;gap:5px;flex-shrink:0}
.due-date-display{font-size:10px;color:var(--text2);background:#f0f2f6;border-radius:3px;padding:1px 5px;cursor:pointer;white-space:nowrap}
.due-date-display.overdue{background:var(--p1bg);color:var(--p1)}
.due-date-display.due-today{background:var(--p2bg);color:var(--p2)}
.notes-indicator-btn{font-size:10px;padding:1px 6px;background:#e8f0fe;color:#1a56db;border:none;border-radius:3px;cursor:pointer;font-family:inherit;white-space:nowrap}
.notes-indicator-btn:hover{background:#c8d9fc}
.tdel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;opacity:0;flex-shrink:0;line-height:1}
.trow:hover .tdel{opacity:1}
.tdel:hover{color:#c0392b}

/* Notes panel (inline below task row) */
.notes-panel{background:#f8f9fc;border-top:1px solid #e8ebf0;padding:6px 10px 6px 30px}
.notes-panel textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 7px;font-size:11px;font-family:inherit;color:var(--text);resize:vertical;min-height:50px;background:var(--surface)}
.notes-panel textarea:focus{outline:none;border-color:var(--accent)}
.notes-panel-footer{display:flex;justify-content:flex-end;gap:6px;margin-top:4px}

/* Footer add-row */
.add-row{display:flex;align-items:center;gap:6px;padding:5px 10px 7px;border-top:1px dashed #e8ebf0}
.add-inp{flex:1;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:4px 8px;font-size:11px;background:transparent;font-family:inherit;color:var(--text);outline:none}
.add-inp::placeholder{color:var(--text3)}
.add-inp:focus{border-color:var(--accent);border-style:solid;background:#f8f9ff}

/* Status bar */
.status-bar{text-align:right;font-size:11px;color:var(--text3);padding:4px 0 0}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.hidden{display:none!important}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,.18);padding:20px 22px;width:100%;max-width:480px;animation:modalIn .15s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px;font-size:12px;font-family:inherit;color:var(--text);outline:none;background:var(--surface)}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--accent)}
.modal-field textarea{resize:vertical;min-height:60px}
.modal-row{display:flex;gap:10px}
.modal-row .modal-field{flex:1}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

/* Inline date/time fields for hot-dates */
.hotdate-time{font-size:11px;color:var(--text3);margin-left:4px}

/* Footer bar */
.footer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:9px 20px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text3);z-index:100}
.footer-bar .spacer{flex:1}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div>
      <div class="app-title">Jonathan's Daily Task List</div>
      <div class="app-date" id="appDate"></div>
    </div>
    <div class="header-actions">
      <button class="btn sm" onclick="syncNow()">&#8635; Sync</button>
      <button class="btn sm primary" onclick="exportDocx()">&#8984; Export .docx</button>
    </div>
  </div>
  <div id="sectionsRoot"></div>
  <div class="status-bar"><span id="statusTxt"></span></div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modalBox">
    <div class="modal-title" id="modalTitle">Add Task</div>

    <!-- Standard fields (shown for most sections) -->
    <div id="modalStandard">
      <div class="modal-field">
        <label>Task</label>
        <textarea id="mText" rows="2" placeholder="Enter task text…"></textarea>
      </div>
      <div class="modal-row">
        <div class="modal-field" id="mPriorityWrap">
          <label>Priority</label>
          <select id="mPriority">
            <option value="P3" selected>P3 — Normal</option>
            <option value="P2">P2 — Medium</option>
            <option value="P1">P1 — High</option>
          </select>
        </div>
        <!-- Due date — only shown for Tasks section -->
        <div class="modal-field hidden" id="mDueDateWrap">
          <label>Due Date (optional)</label>
          <input type="date" id="mDueDate">
        </div>
      </div>
      <div class="modal-field">
        <label>Notes (optional)</label>
        <textarea id="mNotes" rows="2" placeholder="Any additional notes…"></textarea>
      </div>
    </div>

    <!-- Hot Dates & In-House Groups specific fields -->
    <div id="modalHotDate" style="display:none">
      <div class="modal-field">
        <label>Client / Group Name</label>
        <input type="text" id="mHotName" placeholder="e.g. Linda Jones In House">
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Date Range / Date</label>
          <input type="text" id="mHotDate" placeholder="e.g. 3/23/26–3/26/26">
        </div>
        <div class="modal-field">
          <label>Time (optional)</label>
          <input type="time" id="mHotTime">
        </div>
      </div>
      <div class="modal-field" id="mPriorityWrap2">
        <label>Priority</label>
        <select id="mPriority2">
          <option value="P3" selected>P3 — Normal</option>
          <option value="P2">P2 — Medium</option>
          <option value="P1">P1 — High</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Notes (optional)</label>
        <textarea id="mNotes2" rows="2" placeholder="Any additional notes…"></textarea>
      </div>
    </div>

    <!-- Proposals Out specific fields -->
    <div id="modalProposalsOut" style="display:none">
      <div class="modal-field">
        <label>Proposal Name</label>
        <input type="text" id="mPropName" placeholder="e.g. Purina">
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <label>Decision Due Date</label>
          <input type="date" id="mPropDecision">
        </div>
        <div class="modal-field" id="mPriorityWrap3">
          <label>Priority</label>
          <select id="mPriority3">
            <option value="P3" selected>P3 — Normal</option>
            <option value="P2">P2 — Medium</option>
            <option value="P1">P1 — High</option>
          </select>
        </div>
      </div>
      <div class="modal-field">
        <label>Notes (optional)</label>
        <textarea id="mNotes3" rows="2" placeholder="Any additional notes…"></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="submitModal()">Add Task</button>
    </div>
  </div>
</div>

<div class="footer-bar">
  <span id="footerStatus">Loading…</span>
  <span class="spacer"></span>
  <button class="btn sm" onclick="syncNow()">Sync now</button>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const STORE_KEY = 'jdtl_v5';
const API_BASE  = '';  // same-origin — Netlify functions

const SECTIONS = [
  { id:'hotdates',       label:'Hot Dates and In-House Groups', type:'full',       hotdate:true },
  { id:'dbr',            label:'DBR',                           type:'full' },
  { id:'proposals_prep', label:'Proposals',  sub:'Prep',        type:'split_left', pair:'proposals' },
  { id:'proposals_out',  label:'Proposals',  sub:'Out',         type:'split_right',pair:'proposals', proposalsOut:true },
  { id:'contracts_prep', label:'Contracts',  sub:'Prep',        type:'split_left', pair:'contracts' },
  { id:'contracts_out',  label:'Contracts',  sub:'Out',         type:'split_right',pair:'contracts' },
  { id:'tasks',          label:'Tasks / Short-Term Projects',   type:'full',       hasDueDate:true },
  { id:'prospecting',    label:'Prospecting',                   type:'full' },
  { id:'culture',        label:'Culture Club &amp; Sales Manager Affinity Group', sub:'Culture Club', type:'split_left', pair:'cult_aff' },
  { id:'affinity',       label:'Culture Club &amp; Sales Manager Affinity Group', sub:'Sales Manager Affinity Group', type:'split_right', pair:'cult_aff' },
  { id:'travel',         label:'Travel',                        type:'full' },
  { id:'daily_recap',    label:'Daily Recap',                   type:'recap' },
];

// ─── STATE ─────────────────────────────────────────────────────────────────
let DATA = {};
let saveTimer = null;
let modalSec = null;

// ─── UTILS ─────────────────────────────────────────────────────────────────
function gid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function pc(p){ return p==='P1'?'p1':p==='P2'?'p2':'p3'; }
function setStatus(msg){ document.getElementById('statusTxt').textContent=msg; document.getElementById('footerStatus').textContent=msg; }

// ─── STORAGE ────────────────────────────────────────────────────────────────
function saveLocal(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); }catch(e){}
}
function loadLocal(){
  try{
    const d = localStorage.getItem(STORE_KEY);
    if(d){ DATA=JSON.parse(d); return true; }
  }catch(e){}
  SECTIONS.forEach(s=>{ if(s.type!=='recap') DATA[s.id]=[]; });
  return false;
}
function qsave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ saveLocal(); syncUp(); }, 800);
}

// ─── NETLIFY BLOB SYNC ──────────────────────────────────────────────────────
async function syncNow(){
  setStatus('Syncing…');
  try{
    const res = await fetch('/.netlify/functions/sync',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(DATA)
    });
    if(!res.ok) throw new Error(res.status);
    const remote = await res.json();
    DATA = remote;
    saveLocal();
    render();
    setStatus('Synced ' + new Date().toLocaleTimeString());
  }catch(e){
    setStatus('Offline — saved locally');
  }
}
async function syncUp(){
  try{
    await fetch('/.netlify/functions/sync',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(DATA)
    });
  }catch(e){}
}
async function loadRemote(){
  setStatus('Loading…');
  try{
    const res = await fetch('/.netlify/functions/sync');
    if(!res.ok) throw new Error(res.status);
    const remote = await res.json();
    DATA = remote;
    saveLocal();
    setStatus('Loaded ' + new Date().toLocaleTimeString());
  }catch(e){
    loadLocal();
    setStatus('Loaded from local cache');
  }
  render();
}

// ─── MODAL ─────────────────────────────────────────────────────────────────
function openModal(secId){
  modalSec = secId;
  const sec = SECTIONS.find(s=>s.id===secId);

  // Reset all fields
  document.getElementById('mText').value='';
  document.getElementById('mPriority').value='P3';
  document.getElementById('mDueDate').value='';
  document.getElementById('mNotes').value='';
  document.getElementById('mHotName').value='';
  document.getElementById('mHotDate').value='';
  document.getElementById('mHotTime').value='';
  document.getElementById('mPriority2').value='P3';
  document.getElementById('mNotes2').value='';
  document.getElementById('mPropName').value='';
  document.getElementById('mPropDecision').value='';
  document.getElementById('mPriority3').value='P3';
  document.getElementById('mNotes3').value='';

  // Show correct form variant
  document.getElementById('modalStandard').style.display='none';
  document.getElementById('modalHotDate').style.display='none';
  document.getElementById('modalProposalsOut').style.display='none';

  if(sec && sec.hotdate){
    document.getElementById('modalHotDate').style.display='block';
    document.getElementById('modalTitle').textContent='Add to Hot Dates & In-House Groups';
  } else if(sec && sec.proposalsOut){
    document.getElementById('modalProposalsOut').style.display='block';
    document.getElementById('modalTitle').textContent='Add Proposal: Out';
  } else {
    document.getElementById('modalStandard').style.display='block';
    document.getElementById('mDueDateWrap').style.display = (sec && sec.hasDueDate) ? '' : 'none';
    document.getElementById('modalTitle').textContent = 'Add to ' + (sec ? sec.sub||sec.label : 'Section');
    // Clean HTML entities in title
    document.getElementById('modalTitle').textContent = document.getElementById('modalTitle').textContent.replace(/&amp;/g,'&');
  }

  document.getElementById('modalOverlay').classList.remove('hidden');

  // Auto-focus first field
  setTimeout(()=>{
    if(sec && sec.hotdate) document.getElementById('mHotName').focus();
    else if(sec && sec.proposalsOut) document.getElementById('mPropName').focus();
    else document.getElementById('mText').focus();
  },80);
}

function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  modalSec=null;
}

function closeModalOnBg(e){
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

function submitModal(){
  if(!modalSec) return;
  const sec = SECTIONS.find(s=>s.id===modalSec);
  if(!DATA[modalSec]) DATA[modalSec]=[];

  let item;

  if(sec && sec.hotdate){
    const name = document.getElementById('mHotName').value.trim();
    const date = document.getElementById('mHotDate').value.trim();
    const time = document.getElementById('mHotTime').value.trim();
    const pri  = document.getElementById('mPriority2').value;
    const notes= document.getElementById('mNotes2').value.trim();
    if(!name) return;
    let text = name;
    if(date) text += ' ' + date;
    if(time){
      // Convert 24h to 12h
      const [h,m] = time.split(':');
      const hh=parseInt(h);
      text += ' @ ' + (hh===0?12:hh>12?hh-12:hh) + ':' + m + (hh>=12?'pm':'am');
    }
    item = {id:gid(),t:text,p:pri,d:false,notes:notes||''};
  } else if(sec && sec.proposalsOut){
    const name = document.getElementById('mPropName').value.trim();
    const dec  = document.getElementById('mPropDecision').value;
    const pri  = document.getElementById('mPriority3').value;
    const notes= document.getElementById('mNotes3').value.trim();
    if(!name) return;
    let text = name;
    if(dec){
      const parts=dec.split('-');
      text += ' Decision: ' + parseInt(parts[1])+'/'+parseInt(parts[2])+'/'+parts[0].slice(2);
    }
    item = {id:gid(),t:text,p:pri,d:false,notes:notes||''};
  } else {
    const text = document.getElementById('mText').value.trim();
    const pri  = document.getElementById('mPriority').value;
    const due  = document.getElementById('mDueDate').value;
    const notes= document.getElementById('mNotes').value.trim();
    if(!text) return;
    item = {id:gid(),t:text,p:pri,d:false,notes:notes||'',dueDate:due||''};
  }

  DATA[modalSec].push(item);
  closeModal();
  render();
  qsave();
}

// Enter key submits modal
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter'&&e.ctrlKey&&!document.getElementById('modalOverlay').classList.contains('hidden')) submitModal();
});

// ─── RENDER ────────────────────────────────────────────────────────────────
function tRow(secId, item){
  const done = item.d?'done':'';
  const doneText = item.d?'done-text':'';
  const pbClass = pc(item.p);

  // Due date display (tasks section)
  let dueDateHtml='';
  if(item.dueDate){
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(item.dueDate+'T00:00:00');
    const cls = due<today?'overdue':due.getTime()===today.getTime()?'due-today':'';
    const [y,mo,dy] = item.dueDate.split('-');
    dueDateHtml = `<span class="due-date-display ${cls}" title="Due date" onclick="editDueDate('${secId}','${item.id}',this)">${parseInt(mo)}/${parseInt(dy)}/${y.slice(2)}</span>`;
  }

  // Notes indicator
  const hasNotes = item.notes && item.notes.trim().length>0;
  const notesBtn = hasNotes
    ? `<button class="notes-indicator-btn" onclick="toggleNotes('${secId}','${item.id}',this)">Notes</button>`
    : '';

  return `<div class="trow ${done}" data-sec="${secId}" data-id="${item.id}">
    <input type="checkbox" ${item.d?'checked':''} onchange="toggleDone('${secId}','${item.id}',this)">
    <input class="ttext ${doneText}" type="text" value="${esc(item.t)}" onchange="editText('${secId}','${item.id}',this)">
    <div class="task-meta">
      ${dueDateHtml}
      ${notesBtn}
      <span class="pbadge ${pbClass}" onclick="cyclePri('${secId}','${item.id}',this)">${item.p}</span>
      <button class="tdel" onclick="delTask('${secId}','${item.id}')">×</button>
    </div>
  </div>
  <div class="notes-panel hidden" id="np-${item.id}">
    <textarea placeholder="Add notes…" onchange="saveNotes('${secId}','${item.id}',this)">${esc(item.notes||'')}</textarea>
    <div class="notes-panel-footer">
      <button class="btn sm" onclick="closeNotesPanel('${secId}','${item.id}')">Done</button>
    </div>
  </div>`;
}

function activeCount(secId){
  return (DATA[secId]||[]).filter(x=>!x.d).length;
}

function fullSecHTML(sec){
  const rows = (DATA[sec.id]||[]).map(x=>tRow(sec.id,x)).join('');
  const cnt = activeCount(sec.id);
  return `<div class="sec-card">
    <div class="sec-hdr" onclick="handleSecClick('${sec.id}',event)">
      <h3>${sec.label}</h3>
      <span class="sec-count">${cnt}</span>
      <button class="sec-add-btn" onclick="event.stopPropagation();openModal('${sec.id}')">+ Add</button>
    </div>
    <div class="tlist" id="list-${sec.id}">${rows}</div>
    <div class="add-row"><input class="add-inp" type="text" placeholder="Quick add — press Enter…" data-sec="${sec.id}" onkeydown="quickAdd(event,this)"></div>
  </div>`;
}

function splitSecHTML(lSec, rSec){
  const lRows = (DATA[lSec.id]||[]).map(x=>tRow(lSec.id,x)).join('');
  const rRows = (DATA[rSec.id]||[]).map(x=>tRow(rSec.id,x)).join('');
  const cnt = activeCount(lSec.id)+activeCount(rSec.id);
  return `<div class="sec-card">
    <div class="sec-hdr" onclick="handleSplitSecClick('${lSec.id}','${rSec.id}',event)">
      <h3>${lSec.label}</h3>
      <span class="sec-count">${cnt}</span>
    </div>
    <div class="split-body">
      <div class="split-col">
        <div class="split-lbl">${lSec.sub}
          <button class="sec-add-btn" style="float:right;margin-top:-1px" onclick="openModal('${lSec.id}')">+ Add</button>
        </div>
        <div class="tlist" id="list-${lSec.id}">${lRows}</div>
        <div class="add-row"><input class="add-inp" type="text" placeholder="Quick add…" data-sec="${lSec.id}" onkeydown="quickAdd(event,this)"></div>
      </div>
      <div class="split-col">
        <div class="split-lbl">${rSec.sub}
          <button class="sec-add-btn" style="float:right;margin-top:-1px" onclick="openModal('${rSec.id}')">+ Add</button>
        </div>
        <div class="tlist" id="list-${rSec.id}">${rRows}</div>
        <div class="add-row"><input class="add-inp" type="text" placeholder="Quick add…" data-sec="${rSec.id}" onkeydown="quickAdd(event,this)"></div>
      </div>
    </div>
  </div>`;
}

function recapHTML(){
  const val = (DATA['daily_recap']&&DATA['daily_recap'][0]&&DATA['daily_recap'][0].t)||'';
  return `<div class="sec-card">
    <div class="sec-hdr">
      <h3>Daily Recap</h3>
      <button class="sec-add-btn" onclick="generateRecap()">&#9889; Generate</button>
    </div>
    <div style="padding:8px 10px">
      <textarea id="recapTA" style="width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px;font-size:12px;font-family:inherit;min-height:80px;resize:vertical;color:var(--text)" placeholder="Your daily recap will appear here…" onchange="saveRecap(this.value)">${esc(val)}</textarea>
    </div>
  </div>`;
}

function render(){
  const done = new Set();
  let html='';
  SECTIONS.forEach(sec=>{
    if(sec.type==='recap'){
      html+=recapHTML();
      return;
    }
    if(sec.type==='full'){
      html+=fullSecHTML(sec);
    } else if(sec.type==='split_left'&&!done.has(sec.pair)){
      done.add(sec.pair);
      const rSec=SECTIONS.find(s=>s.pair===sec.pair&&s.type==='split_right');
      if(rSec) html+=splitSecHTML(sec,rSec);
    }
  });
  document.getElementById('sectionsRoot').innerHTML=html;
}

// ─── INTERACTIONS ──────────────────────────────────────────────────────────
function handleSecClick(secId, e){
  // If click originated from a button/input inside the header, ignore
  if(e.target.closest('button,.sec-add-btn')) return;
  openModal(secId);
}
function handleSplitSecClick(lId, rId, e){
  if(e.target.closest('button,.sec-add-btn')) return;
  // Ask which sub-section via the add buttons already in header — no-op here
  // (Users use the + Add buttons in each split-col sub-label)
}

function toggleDone(secId,id,cb){
  const item=DATA[secId].find(x=>x.id===id);
  if(!item)return;
  item.d=cb.checked;
  const row=cb.closest('.trow');
  row.classList.toggle('done',item.d);
  row.querySelector('.ttext').classList.toggle('done-text',item.d);
  qsave();
}

function editText(secId,id,inp){
  const item=DATA[secId].find(x=>x.id===id);
  if(item){item.t=inp.value;qsave();}
}

function cyclePri(secId,id,badge){
  const item=DATA[secId].find(x=>x.id===id);
  if(!item)return;
  const order=['P3','P1','P2'];
  item.p=order[(order.indexOf(item.p)+1)%3];
  badge.textContent=item.p;
  badge.className='pbadge '+pc(item.p);
  qsave();
}

function delTask(secId,id){
  DATA[secId]=DATA[secId].filter(x=>x.id!==id);
  const row=document.querySelector(`.trow[data-sec="${secId}"][data-id="${id}"]`);
  const np=document.getElementById('np-'+id);
  if(row) row.remove();
  if(np) np.remove();
  // Update count
  const card=document.querySelector(`[id="list-${secId}"]`);
  if(card){
    const sec=SECTIONS.find(s=>s.id===secId);
    if(sec){
      const hdr=document.querySelector(`.sec-hdr`);
      // Re-render just the count (simpler: full re-render)
    }
  }
  qsave();
  // Re-render to update counts
  render();
}

function toggleNotes(secId,id,btn){
  const panel=document.getElementById('np-'+id);
  if(!panel)return;
  const isOpen=!panel.classList.contains('hidden');
  if(isOpen){
    panel.classList.add('hidden');
  } else {
    panel.classList.remove('hidden');
    panel.querySelector('textarea').focus();
  }
}

function saveNotes(secId,id,ta){
  const item=DATA[secId]&&DATA[secId].find(x=>x.id===id);
  if(!item)return;
  item.notes=ta.value;
  // Update notes button visibility
  const row=document.querySelector(`.trow[data-sec="${secId}"][data-id="${id}"]`);
  if(row){
    const existing=row.querySelector('.notes-indicator-btn');
    if(ta.value.trim()){
      if(!existing){
        const meta=row.querySelector('.task-meta');
        const btn=document.createElement('button');
        btn.className='notes-indicator-btn';
        btn.textContent='Notes';
        btn.setAttribute('onclick',`toggleNotes('${secId}','${id}',this)`);
        meta.insertBefore(btn,meta.firstChild);
      }
    } else {
      if(existing) existing.remove();
    }
  }
  qsave();
}

function closeNotesPanel(secId,id){
  const panel=document.getElementById('np-'+id);
  if(panel) panel.classList.add('hidden');
}

function editDueDate(secId,id,el){
  const item=DATA[secId]&&DATA[secId].find(x=>x.id===id);
  if(!item)return;
  const inp=document.createElement('input');
  inp.type='date';
  inp.value=item.dueDate||'';
  inp.style.cssText='font-size:10px;border:1px solid var(--accent);border-radius:3px;padding:0 3px;width:100px';
  el.replaceWith(inp);
  inp.focus();
  inp.addEventListener('blur',()=>{
    item.dueDate=inp.value;
    qsave();
    render();
  });
  inp.addEventListener('change',()=>{ inp.blur(); });
}

function quickAdd(e,inp){
  if(e.key!=='Enter'||!inp.value.trim())return;
  const secId=inp.dataset.sec;
  if(!DATA[secId])DATA[secId]=[];
  DATA[secId].push({id:gid(),t:inp.value.trim(),p:'P3',d:false,notes:'',dueDate:''});
  inp.value='';
  render();
  qsave();
  // Restore focus to same section's add input
  setTimeout(()=>{
    const newInp=document.querySelector(`.add-inp[data-sec="${secId}"]`);
    if(newInp) newInp.focus();
  },50);
}

// ─── RECAP ─────────────────────────────────────────────────────────────────
function saveRecap(val){
  if(!DATA['daily_recap']) DATA['daily_recap']=[];
  if(DATA['daily_recap'][0]) DATA['daily_recap'][0].t=val;
  else DATA['daily_recap'].push({id:gid(),t:val,p:'P3',d:false});
  qsave();
}

async function generateRecap(){
  const ta=document.getElementById('recapTA');
  if(!ta)return;
  ta.value='Generating…';
  try{
    const res=await fetch('/.netlify/functions/recap',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tasks:DATA})
    });
    const json=await res.json();
    const paragraphs=json.paragraphs||[];
    ta.value=paragraphs.join('\n\n');
    saveRecap(ta.value);
  }catch(e){
    ta.value='Failed to generate recap. Please try again.';
  }
}

// ─── EXPORT ────────────────────────────────────────────────────────────────
async function exportDocx(){
  setStatus('Generating export…');
  try{
    const res=await fetch('/.netlify/functions/export',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tasks:DATA,recap:document.getElementById('recapTA')?.innerHTML||''})
    });
    if(!res.ok) throw new Error(res.status);
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const today=new Date();
    const mm=String(today.getMonth()+1).padStart(2,'0');
    const dd=String(today.getDate()).padStart(2,'0');
    const yyyy=today.getFullYear();
    a.href=url;
    a.download=`jonathans_task_list_${mm}-${dd}-${yyyy}.docx`;
    a.click();
    URL.revokeObjectURL(url);
    setStatus('Exported!');
  }catch(e){
    setStatus('Export failed — try again');
  }
}

document.getElementById('appDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
